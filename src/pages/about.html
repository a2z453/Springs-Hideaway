<script>
  /* Keep the same sunset script here so the theme follows you across pages */
  async function setLocalTheme() {
    const lat = 51.048615;
    const lng = -114.070847;
    try {
      const response = await fetch(`https://api.sunrise-sunset.org/json?lat=${lat}&lng=${lng}&formatted=0`);
      const data = await response.json();
      const now = new Date();
      const sunrise = new Date(data.results.sunrise);
      const sunset = new Date(data.results.sunset);
      const isDarkTheme = now >= sunset || now < sunrise;
      const themeValue = isDarkTheme ? 'dark' : 'light';

      if (document.documentElement.getAttribute('data-theme') !== themeValue) {
          if (document.startViewTransition) {
              document.startViewTransition(() => {
                  document.documentElement.setAttribute('data-theme', themeValue);
              });
          } else {
              document.documentElement.setAttribute('data-theme', themeValue);
          }
      }
    } catch (e) { console.error(e); }
  }
  setLocalTheme();
  setInterval(setLocalTheme, 900000);
</script>
